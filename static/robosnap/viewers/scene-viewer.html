<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RoboSnap Interactive Scene Viewer</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #111820;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    #viewer-root {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 50% 42%, #24313a 0%, #111820 62%);
      isolation: isolate;
    }

    #viewer-root canvas {
      display: block;
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .viewer-status {
      position: fixed;
      right: 14px;
      bottom: 12px;
      max-width: min(360px, calc(100vw - 28px));
      padding: 8px 11px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 6px;
      background: rgba(17, 24, 32, 0.76);
      color: rgba(255, 255, 255, 0.86);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.35;
      pointer-events: none;
    }

    .viewer-status[hidden] {
      display: none;
  }
  </style>
  <script src="asset-config.js?v=20260706-asset-base"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.1/examples/jsm/",
      "@mkkellogg/gaussian-splats-3d": "https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.7/build/gaussian-splats-3d.module.js"
    }
  }
  </script>
</head>
<body>
  <div id="viewer-root" aria-label="Interactive Gaussian splat scene"></div>
  <div class="viewer-status" id="viewer-status">Loading scene</div>
  <script type="module" src="scene-viewer.js?v=20260706-asset-base"></script>
</body>
</html>
